version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/app
      - /app/node_modules
      - bot_data:/data
    ports:
      - "3000"
    env_file:
      - .env
    environment:
      NODE_ENV: development
    command: npm run dev
    networks:
      - bot-network

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    volumes:
      - bot_data:/data
    env_file:
      - .env
    networks:
      - bot-network

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    environment:
      VITE_API_URL: http://localhost:8081
    networks:
      - bot-network

volumes:
  bot_data:

networks:
  bot-network:
    driver: bridge
